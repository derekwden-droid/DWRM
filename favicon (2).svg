n:all .15s}.btn-primary:hover:not(:disabled){background-color:#a78bfa33;border-color:#a78bfab3}.btn-primary:disabled{opacity:.3;cursor:not-allowed}.btn-ghost{background:transparent;border:1px solid #1f2937;color:#6b7280;padding:6px 12px;font-size:11px;font-family:JetBrains Mono,monospace;letter-spacing:.1em;text-transform:uppercase;cursor:pointer;transition:all .15s}.btn-ghost:hover:not(:disabled){border-color:#374151;color:#e2e8f0}.btn-ghost:disabled{opacity:.3;cursor:not-allowed}.badge-cpu{border:1px solid rgba(245,158,11,.3);background:#f59e0b0d;color:#f59e0b;padding:2px 8px;font-size:10px}.badge-gpu{border:1px solid rgba(96,165,250,.3);background:#60a5fa0d;color:#60a5fa;padding:2px 8px;font-size:10px}.badge-quantum{border:1px solid rgba(167,139,250,.3);background:#a78bfa0d;color:#a78bfa;padding:2px 8px;font-size:10px}.score-bar-track{height:4px;background-color:#37415180;border-radius:2px;overflow:hidden}.score-bar-fill{height:100%;border-radius:2px;transition:width .7s cubic-bezier(.4,0,.2,1)}.collapse{visibility:collapse}.sticky{position:sticky}.inline-block{display:inline-block}.flex{display:flex}.table{display:table}.grid{display:grid}.hidden{display:none}.resize{resize:both}.border{border-width:1px}.uppercase{text-transform:uppercase}.transition{transition-property:color,background-color,border-color,text-decoration-color,fill,stroke,opacity,box-shadow,transform,filter,backdrop-filter;transition-timing-function:cubic-bezier(.4,0,.2,1);transition-duration:.15s}@keyframes fadeIn{0%{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}.fade-in{animation:fadeIn .3s ease forwards}@keyframes spin{to{transform:rotate(360deg)}}.spinner{display:inline-block;width:12px;height:12px;border:2px solid rgba(167,139,250,.3);border-top-color:#a78bfa;border-radius:50%;animation:spin .7s linear infinite}
